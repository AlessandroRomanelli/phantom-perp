# Strategy Matrix — which strategies run on which instruments.
# This is the single source of truth for per-instrument enablement.
# Individual strategy YAMLs control global enabled/disabled state;
# this matrix controls per-instrument enablement within that.

strategies:
  momentum:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP
      - QQQ-PERP
      - SPY-PERP

  mean_reversion:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP
      - QQQ-PERP
      - SPY-PERP

  liquidation_cascade:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP
      # QQQ/SPY disabled: liquidation cascades are crypto-native (D-11)

  correlation:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP
      - QQQ-PERP
      - SPY-PERP
      # QQQ/SPY enabled: basis divergence valid for equity perps

  regime_trend:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP
      - QQQ-PERP
      - SPY-PERP

  orderbook_imbalance:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP
      - QQQ-PERP
      - SPY-PERP
      # All instruments enabled per D-11; depth gate naturally suppresses thin books
