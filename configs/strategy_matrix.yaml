# Strategy Matrix — which strategies run on which instruments.
# This is the single source of truth for per-instrument enablement.
# Individual strategy YAMLs control global enabled/disabled state;
# this matrix controls per-instrument enablement within that.

strategies:
  momentum:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP

  mean_reversion:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP

  liquidation_cascade:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP
      # QQQ/SPY excluded: liquidation cascades are crypto-native (D-11)

  correlation:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP

  regime_trend:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP

  orderbook_imbalance:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP

  vwap:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP

  claude_market_analysis:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP
      # QQQ/SPY excluded: Claude analysis targets crypto perps only

  oi_divergence:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP
      # QQQ/SPY excluded: OI divergence is crypto-native (perpetuals OI data)

  funding_arb:
    enabled: true
    instruments:
      - ETH-PERP
      - BTC-PERP
      - SOL-PERP
      # QQQ/SPY excluded: funding rates are crypto-perp-native (no equity perps)
