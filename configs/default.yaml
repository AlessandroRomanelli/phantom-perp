instruments:
  - id: "ETH-PERP"
    base_currency: "ETH"
    quote_currency: "USDC"
    tick_size: 0.01
    min_order_size: 0.0001
  - id: "BTC-PERP"
    base_currency: "BTC"
    quote_currency: "USDC"
    tick_size: 0.01
    min_order_size: 0.00001
  - id: "SOL-PERP"
    base_currency: "SOL"
    quote_currency: "USDC"
    tick_size: 0.001
    min_order_size: 0.01

coinbase:
  rest_base_url: "https://api.coinbase.com"
  rate_limit_buffer_pct: 20

fees:
  tier: "VIP1"
  maker_rate: 0.000125
  taker_rate: 0.000250

funding:
  settlement_interval: "hourly"
  settlement_currency: "USDC"
  settlements_per_day: 24

portfolio:
  transfers:
    automatic: false
    system_initiated: false

  routing:
    rules:
      - condition: "time_horizon < 2h"
        target: "A"
      - condition: "source in [FUNDING_ARB, ORDERBOOK_IMBALANCE, LIQUIDATION_CASCADE]"
        target: "A"
      - condition: "conviction >= 0.85 and time_horizon < 4h"
        target: "A"
      - condition: "default"
        target: "B"

alpha:
  min_agreeing_sources: 1
  combination_window_seconds: 300
  exempt_sources:
    - claude_market_analysis

risk:
  correlation_groups:
    - ["ETH-PERP", "BTC-PERP", "SOL-PERP"]
    - ["QQQ-PERP", "SPY-PERP"]

  route_a:
    max_leverage: 10.0
    max_position_notional_usdc: 20000
    max_position_pct_equity: 40.0
    max_margin_utilization_pct: 70.0
    min_liquidation_distance_pct: 8.0
    max_daily_loss_pct: 10.0
    max_drawdown_pct: 25.0
    stop_loss_required: true
    max_concurrent_positions: 6
    max_positions_per_instrument: 2
    max_funding_cost_per_day_usdc: 20
    correlation_enabled: true
    max_net_directional_exposure_pct: 100.0
    hwm_drawdown_enabled: true

  route_b:
    max_leverage: 5.0
    max_position_notional_usdc: 32000
    max_position_pct_equity: 25.0
    max_margin_utilization_pct: 50.0
    min_liquidation_distance_pct: 15.0
    max_daily_loss_pct: 5.0
    max_drawdown_pct: 15.0
    stop_loss_required: true
    max_concurrent_positions: 3
    max_positions_per_instrument: 2
    max_funding_cost_per_day_usdc: 100
    correlation_enabled: true
    max_net_directional_exposure_pct: 80.0
    hwm_drawdown_enabled: true

  regime_leverage:
    route_a:
      trending_up: 5.0
      trending_down: 5.0
      ranging: 4.0
      high_volatility: 3.0
      low_volatility: 5.0
      squeeze: 3.0
    route_b:
      trending_up: 4.0
      trending_down: 4.0
      ranging: 2.0
      high_volatility: 1.5
      low_volatility: 3.0
      squeeze: 2.0

  global:
    stale_data_halt_seconds: 30
    conviction_power: 1.0
    min_expected_move_pct: 0.003

execution:
  default_order_type: "limit"
  limit_offset_bps: 5
  order_ttl_seconds: 120
  max_slippage_bps: 20
  retry_on_rejection: true
  max_retries: 2
  prefer_maker: true
  sl_limit_buffer_bps: 10
  instruments:
    BTC-PERP:
      limit_offset_bps: 2
    ETH-PERP:
      limit_offset_bps: 3
    SOL-PERP:
      limit_offset_bps: 5
    QQQ-PERP:
      limit_offset_bps: 4
    SPY-PERP:
      limit_offset_bps: 3

confirmation:
  default_ttl_seconds: 300
  stale_price_threshold_pct: 1.0
  auto_approve:
    enabled: false
    max_notional_usdc: 2000
    min_conviction: 0.9
    only_reduce: false
  quiet_hours:
    enabled: true
    start: "23:00"
    end: "07:00"
    timezone: "Europe/Zurich"
    behavior: "queue"
  batching:
    enabled: true
    window_seconds: 30
    max_batch_size: 5
  daily_budget:
    enabled: false
    max_daily_notional_usdc: 20000

notification:
  autonomous_trades:
    mode: "realtime"
    include_stop_loss_triggers: true
    include_funding_settlements: false

messaging:
  reclaim_idle_ms: 60000
  reclaim_batch_size: 10

monitoring:
  funding_alert_threshold_pct: 0.03
  margin_alert_threshold_pct: 50.0
  liquidation_distance_alert_pct: 15.0
  ws_reconnect_max_delay_seconds: 30
  heartbeat_interval_seconds: 60
  performance_report:
    frequency: "daily"
    include_route_breakdown: true
    include_funding_attribution: true
    include_fee_breakdown: true

paper_simulator:
  fill_probability_base: 0.7
  adverse_selection_bps: 5
  sl_slippage_bps: 10
