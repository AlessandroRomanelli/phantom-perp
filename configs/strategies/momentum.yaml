strategy:
  name: "momentum"
  enabled: true
  weight: 0.20

parameters:
  fast_ema_period: 12
  slow_ema_period: 26
  adx_period: 14
  adx_threshold: 20.0
  rsi_period: 14
  rsi_overbought: 70
  rsi_oversold: 30
  atr_period: 14
  stop_loss_atr_mult: 3.0
  take_profit_atr_mult: 4.5
  min_conviction: 0.40
  cooldown_bars: 10
  vol_lookback: 10
  vol_min_ratio: 0.5
  route_a_min_conviction: 0.85
  swing_lookback: 20
  swing_order: 3
  funding_rate_boost: 0.08
  funding_z_score_threshold: 1.5
  funding_min_samples: 10

instruments:
  ETH-PERP:
    parameters:
      # ETH: Mid-vol crypto, moderate liquidity. Lower volume gate for more signals.
      min_conviction: 0.35
      cooldown_bars: 8
      vol_lookback: 10
      vol_min_ratio: 0.4
      swing_lookback: 20
      swing_order: 3
      funding_rate_boost: 0.08
      adx_threshold: 18.0

  BTC-PERP:
    parameters:
      # BTC: Lower vol, deepest liquidity, longer trends. Higher quality filters.
      min_conviction: 0.35
      cooldown_bars: 16
      vol_lookback: 15
      vol_min_ratio: 0.6
      swing_lookback: 30
      swing_order: 4
      funding_rate_boost: 0.06
      adx_threshold: 22.0

  SOL-PERP:
    parameters:
      # SOL: Highest vol, thinner book, fastest moves. Widest stops, lowest gates.
      min_conviction: 0.30
      cooldown_bars: 6
      vol_lookback: 8
      vol_min_ratio: 0.35
      swing_lookback: 15
      swing_order: 2
      stop_loss_atr_mult: 3.5
      take_profit_atr_mult: 5.0
      funding_rate_boost: 0.10
      adx_threshold: 18.0

  QQQ-PERP:
    parameters:
      # QQQ: Equity derivative, session-bound. Conservative settings.
      min_conviction: 0.35
      cooldown_bars: 20
      vol_lookback: 12
      vol_min_ratio: 0.5
      swing_lookback: 25
      swing_order: 4
      funding_rate_boost: 0.05
      adx_threshold: 20.0

  SPY-PERP:
    parameters:
      # SPY: Most liquid equity, steady trends. Most conservative.
      min_conviction: 0.35
      cooldown_bars: 24
      vol_lookback: 15
      vol_min_ratio: 0.55
      swing_lookback: 25
      swing_order: 4
      funding_rate_boost: 0.04
      adx_threshold: 22.0
