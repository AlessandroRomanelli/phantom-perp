strategy:
  name: "liquidation_cascade"
  enabled: true
  weight: 0.10

parameters:
  oi_lookback: 10
  oi_drop_threshold_pct: 2.0
  imbalance_threshold: 0.3
  vol_spike_mult: 1.5
  atr_period: 14
  stop_loss_atr_mult: 2.0
  take_profit_atr_mult: 2.5
  min_conviction: 0.45
  cooldown_bars: 12

instruments:
  ETH-PERP:
    parameters:
      # ETH: Regular liquidation events, lower thresholds for more signals (D-04)
      oi_drop_threshold_pct: 1.5
      imbalance_threshold: 0.25
      vol_spike_mult: 1.3
      min_conviction: 0.40
      cooldown_bars: 10

  BTC-PERP:
    parameters:
      # BTC: Deeper liquidity, liquidation events are larger but rarer
      oi_lookback: 12
      oi_drop_threshold_pct: 1.8
      imbalance_threshold: 0.25
      vol_spike_mult: 1.4
      min_conviction: 0.40
      cooldown_bars: 12

  SOL-PERP:
    parameters:
      # SOL: Thin book, frequent small liquidation events
      oi_lookback: 8
      oi_drop_threshold_pct: 1.5
      imbalance_threshold: 0.2
      vol_spike_mult: 1.2
      stop_loss_atr_mult: 2.5
      take_profit_atr_mult: 3.0
      min_conviction: 0.35
      cooldown_bars: 8

  QQQ-PERP:
    enabled: false

  SPY-PERP:
    enabled: false
