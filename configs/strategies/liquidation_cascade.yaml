strategy:
  name: "liquidation_cascade"
  enabled: true
  weight: 0.10

parameters:
  oi_lookback: 10
  imbalance_threshold: 0.3
  vol_spike_mult: 1.5
  atr_period: 14
  min_conviction: 0.45
  cooldown_bars: 24

  # Portfolio A routing — require high conviction for autonomous execution
  route_a_min_conviction: 0.85

  # Tier classification thresholds (LIQ-01)
  tier1_min_oi_drop_pct: 2.0
  tier2_min_oi_drop_pct: 4.0
  tier3_min_oi_drop_pct: 8.0

  # Tier-specific stop/TP ATR multipliers (LIQ-01)
  tier1_stop_atr_mult: 1.5
  tier1_tp_atr_mult: 2.0
  tier2_stop_atr_mult: 2.0
  tier2_tp_atr_mult: 3.0
  tier3_stop_atr_mult: 3.0
  tier3_tp_atr_mult: 4.5

  # Volume surge confirmation (LIQ-02)
  vol_lookback: 10
  vol_surge_min_ratio: 1.5

  # Coinglass heatmap magnet mode (S03)
  heatmap_magnet_enabled: true
  cluster_min_notional_usd: 500000
  magnet_proximity_pct: 3.0
  cluster_score_weight: 0.20
  heatmap_fallback_on_missing: true

instruments:
  ETH-PERP:
    parameters:
      # ETH: Regular liquidation events, lower thresholds for more signals (D-04)
      tier1_min_oi_drop_pct: 1.5
      imbalance_threshold: 0.25
      vol_spike_mult: 1.3
      min_conviction: 0.40
      cooldown_bars: 20

  BTC-PERP:
    parameters:
      # BTC: Deeper liquidity, liquidation events are larger but rarer
      oi_lookback: 12
      tier1_min_oi_drop_pct: 1.8
      imbalance_threshold: 0.25
      vol_spike_mult: 1.4
      min_conviction: 0.40
      cooldown_bars: 24
      # BTC has large absolute liquidation walls — raise min notional threshold
      cluster_min_notional_usd: 5000000

  SOL-PERP:
    parameters:
      # SOL: Thin book, frequent small liquidation events, wider tier stops
      oi_lookback: 8
      tier1_min_oi_drop_pct: 1.5
      imbalance_threshold: 0.2
      vol_spike_mult: 1.2
      tier1_stop_atr_mult: 2.0
      tier1_tp_atr_mult: 2.5
      tier2_stop_atr_mult: 2.5
      tier2_tp_atr_mult: 3.5
      tier3_stop_atr_mult: 3.5
      tier3_tp_atr_mult: 5.0
      min_conviction: 0.35
      cooldown_bars: 16
      # SOL has smaller per-liquidation notional — lower threshold to capture walls
      cluster_min_notional_usd: 200000

  QQQ-PERP:
    enabled: false

  SPY-PERP:
    enabled: false
