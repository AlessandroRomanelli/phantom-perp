strategy:
  name: "regime_trend"
  enabled: true
  weight: 0.30

# Default parameters — applied to all instruments unless overridden below.
parameters:
  # Higher-timeframe trend filter
  trend_ema_period: 50
  trend_slope_lookback: 5
  adx_period: 14
  adx_threshold: 22

  # Volatility expansion filter
  atr_period: 14
  atr_avg_period: 30
  atr_expansion_threshold: 1.1

  # Spot confirmation filter
  spot_ema_period: 20
  spot_slope_lookback: 5

  # Entry patterns
  fast_ema_period: 20
  breakout_lookback: 20
  pullback_tolerance_atr: 0.3

  # Risk management (Portfolio B — wider stops, longer hold)
  stop_loss_atr_mult: 2.5
  take_profit_atr_mult: 4.0

  # Portfolio A — autonomous, breakout-only, tighter risk
  portfolio_a_enabled: true
  portfolio_a_min_conviction: 0.85
  portfolio_a_breakout_only: true
  portfolio_a_stop_loss_atr_mult: 2.5
  portfolio_a_take_profit_atr_mult: 3.5

  # Adaptive thresholds (RT-01)
  adx_adapt_enabled: true
  adx_adapt_low_mult: 0.8
  adx_adapt_high_mult: 1.2
  adx_adapt_min: 15.0
  adx_adapt_max: 35.0
  atr_expand_adapt_low_mult: 0.85
  atr_expand_adapt_high_mult: 1.15
  atr_expand_adapt_min: 0.8
  atr_expand_adapt_max: 1.5

  # Trailing stop metadata (RT-02)
  trail_enabled: true
  trail_activation_pct: 1.0
  trail_distance_atr: 1.5
  initial_stop_atr_mult: 1.8

  # Signal control — lowered from 0.5 for more signals (D-04)
  min_conviction: 0.40
  cooldown_bars: 16

# ── Per-instrument overrides ─────────────────────────────────────────────
# Only the keys you specify are overridden; everything else keeps the
# defaults above.  Set "enabled: false" to disable for that instrument.

instruments:
  ETH-PERP:
    parameters:
      # ETH: Mid-vol crypto, slightly lower thresholds than defaults (D-04)
      adx_threshold: 20
      atr_expansion_threshold: 1.0
      min_conviction: 0.35
      cooldown_bars: 12

  BTC-PERP:
    parameters:
      # BTC trends on longer timeframes, needs heavier smoothing
      trend_ema_period: 60
      atr_avg_period: 40
      adx_threshold: 25
      min_conviction: 0.35
      cooldown_bars: 24
      trail_activation_pct: 1.5

  SOL-PERP:
    parameters:
      # SOL is more volatile — wider expansion threshold, shorter EMAs
      trend_ema_period: 35
      atr_expansion_threshold: 1.2
      fast_ema_period: 15
      breakout_lookback: 15
      stop_loss_atr_mult: 3.0
      take_profit_atr_mult: 5.0
      min_conviction: 0.35
      cooldown_bars: 12
      adx_adapt_high_mult: 1.3
      trail_distance_atr: 2.0

  QQQ-PERP:
    parameters:
      # Equity index — less volatile, longer trends, tighter filters
      trend_ema_period: 60
      adx_threshold: 20
      atr_expansion_threshold: 1.0
      min_conviction: 0.35
      cooldown_bars: 30
      # Disable Portfolio A — index moves are slower, confirmation preferred
      portfolio_a_enabled: false
      trail_enabled: false

  SPY-PERP:
    parameters:
      # Similar to QQQ but even more conservative
      trend_ema_period: 60
      adx_threshold: 20
      atr_expansion_threshold: 1.0
      min_conviction: 0.35
      cooldown_bars: 30
      portfolio_a_enabled: false
      trail_enabled: false
