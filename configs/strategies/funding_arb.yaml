strategy:
  name: "funding_arb"
  enabled: true
  weight: 0.20

parameters:
  zscore_threshold: 2.0
  lookback_hours: 168
  min_funding_samples: 10
  oi_zscore_threshold: 1.0
  oi_lookback: 100
  persistence_lookback: 10
  persistence_min_ratio: 0.6
  min_conviction: 0.55
  max_holding_hours: 16
  atr_period: 14
  stop_loss_atr_mult: 1.5
  take_profit_atr_mult: 3.0
  cooldown_bars: 12
  portfolio_a_min_conviction: 0.70

instruments:
  ETH-PERP:
    # ETH funding spikes faster — lower threshold and shorter cooldown
    zscore_threshold: 1.8
    cooldown_bars: 10
  BTC-PERP:
    # BTC moves slower — require stronger signal and stricter conviction
    zscore_threshold: 2.2
    cooldown_bars: 14
    min_conviction: 0.60
  SOL-PERP:
    # SOL has extreme swings — wider stops to absorb volatility
    zscore_threshold: 1.5
    stop_loss_atr_mult: 2.0
    take_profit_atr_mult: 3.5
