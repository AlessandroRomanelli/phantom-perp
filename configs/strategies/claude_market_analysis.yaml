strategy:
  name: "claude_market_analysis"
  enabled: true
  weight: 0.15

parameters:
  # How often Claude re-analyses each instrument (seconds)
  analysis_interval_seconds: 300
  # Upper bound for the in-process signal queue
  max_queue_size: 50
  # Signals below this conviction are dropped before enqueueing
  min_conviction: 0.50
  # Floor for Portfolio A routing
  portfolio_a_min_conviction: 0.75
  # Default time horizon when LLM does not specify one
  default_time_horizon_hours: 4.0

instruments:
  ETH-PERP:
    parameters:
      # ETH: high-frequency price action, tighter conviction bar acceptable
      analysis_interval_seconds: 240
      min_conviction: 0.45
      portfolio_a_min_conviction: 0.70
      default_time_horizon_hours: 3.0

  BTC-PERP:
    parameters:
      # BTC: deeper liquidity, slower regime shifts — slightly longer cadence
      analysis_interval_seconds: 300
      min_conviction: 0.50
      portfolio_a_min_conviction: 0.75
      default_time_horizon_hours: 4.0

  SOL-PERP:
    parameters:
      # SOL: highest volatility, fastest moves — short cadence, lower conviction bar
      analysis_interval_seconds: 180
      min_conviction: 0.45
      portfolio_a_min_conviction: 0.70
      default_time_horizon_hours: 2.0
