strategy:
  name: "correlation"
  enabled: true
  weight: 0.10

parameters:
  # Multi-window basis lookbacks (CORR-01)
  basis_short_lookback: 30
  basis_medium_lookback: 60
  basis_long_lookback: 120
  basis_zscore_threshold: 2.0
  oi_divergence_lookback: 20
  oi_divergence_threshold_pct: 1.5
  atr_period: 14
  stop_loss_atr_mult: 3.0
  take_profit_atr_mult: 4.0
  min_conviction: 0.35
  cooldown_bars: 24
  # Funding rate integration (CORR-02)
  funding_rate_boost: 0.10
  # Portfolio A routing (CORR-03)
  route_a_min_conviction: 0.85

instruments:
  ETH-PERP:
    parameters:
      # ETH: Good basis dynamics, lower thresholds for more signals (D-04)
      basis_short_lookback: 25
      basis_medium_lookback: 50
      basis_long_lookback: 100
      basis_zscore_threshold: 1.8
      oi_divergence_threshold_pct: 1.2
      min_conviction: 0.30
      # Phase 4: funding integration
      funding_z_score_threshold: 1.3
      funding_rate_boost: 0.10

  BTC-PERP:
    parameters:
      # BTC: Higher liquidity = tighter basis, longer windows for slower dynamics
      basis_short_lookback: 35
      basis_medium_lookback: 70
      basis_long_lookback: 140
      basis_zscore_threshold: 1.7
      oi_divergence_threshold_pct: 1.0
      min_conviction: 0.30
      # Phase 4: funding integration, higher z-score for BTC stability
      funding_z_score_threshold: 1.5
      funding_rate_boost: 0.08

  SOL-PERP:
    parameters:
      # SOL: Wider basis swings, shorter windows for fast moves
      basis_short_lookback: 20
      basis_medium_lookback: 40
      basis_long_lookback: 80
      basis_zscore_threshold: 2.0
      oi_divergence_threshold_pct: 2.0
      min_conviction: 0.25
      # Phase 4: funding integration, lowest z-score for volatile SOL funding
      funding_z_score_threshold: 1.2
      funding_rate_boost: 0.12

  QQQ-PERP:
    parameters:
      # QQQ: Equity perp basis reflects index tracking quality. Higher thresholds.
      basis_short_lookback: 30
      basis_medium_lookback: 60
      basis_long_lookback: 120
      basis_zscore_threshold: 2.2
      oi_divergence_threshold_pct: 2.0
      min_conviction: 0.30
      # Phase 4: funding integration, conservative settings
      funding_z_score_threshold: 1.5
      funding_rate_boost: 0.06

  SPY-PERP:
    parameters:
      # SPY: Tightest basis tracking of all. Highest thresholds.
      basis_short_lookback: 30
      basis_medium_lookback: 60
      basis_long_lookback: 120
      basis_zscore_threshold: 2.5
      oi_divergence_threshold_pct: 2.0
      min_conviction: 0.30
      # Phase 4: funding integration, most conservative
      funding_z_score_threshold: 1.5
      funding_rate_boost: 0.05
