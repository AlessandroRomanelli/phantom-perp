services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: phantom_perp
      POSTGRES_USER: phantom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phantom_dev}
    volumes:
      - pg_data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_buffers=64MB
        -c work_mem=4MB
        -c effective_cache_size=128MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phantom -d phantom_perp"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ingestion:
    build:
      context: .
      dockerfile: agents/ingestion/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://phantom:${POSTGRES_PASSWORD:-phantom_dev}@postgres:5432/phantom_perp
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  signals:
    build:
      context: .
      dockerfile: agents/signals/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://phantom:${POSTGRES_PASSWORD:-phantom_dev}@postgres:5432/phantom_perp
    volumes:
      - strategy_configs:/app/configs/strategies:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  alpha:
    build:
      context: .
      dockerfile: agents/alpha/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  risk:
    build:
      context: .
      dockerfile: agents/risk/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://phantom:${POSTGRES_PASSWORD:-phantom_dev}@postgres:5432/phantom_perp
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  confirmation:
    build:
      context: .
      dockerfile: agents/confirmation/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  execution:
    build:
      context: .
      dockerfile: agents/execution/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://phantom:${POSTGRES_PASSWORD:-phantom_dev}@postgres:5432/phantom_perp
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  reconciliation:
    build:
      context: .
      dockerfile: agents/reconciliation/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://phantom:${POSTGRES_PASSWORD:-phantom_dev}@postgres:5432/phantom_perp
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  monitoring:
    build:
      context: .
      dockerfile: agents/monitoring/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://phantom:${POSTGRES_PASSWORD:-phantom_dev}@postgres:5432/phantom_perp
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  tuner:
    build:
      context: .
      dockerfile: agents/tuner/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://phantom:${POSTGRES_PASSWORD:-phantom_dev}@postgres:5432/phantom_perp
    volumes:
      - strategy_configs:/app/configs/strategies
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  scheduler:
    build:
      context: .
      dockerfile: agents/scheduler/Dockerfile
    environment:
      TUNER_CRON: ${TUNER_CRON:-0 0 * * *}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: agents/dashboard/Dockerfile
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379
      DASHBOARD_REFRESH: "2"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
  strategy_configs:
